name: Bug Report
description: Report a reproducible bug with enough detail for an AI agent to fix it safely.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: "When ..., the app/server ... instead of ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click/run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Browser / Runtime:
        - App version / Commit:

  - type: textarea
    id: suspected_area
    attributes:
      label: Suspected Area
      description: Optional, but helps the agent start in the right place.
      placeholder: |
        - src/...
        - tests/...
        - docs/...

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Add logs, screenshots, stack traces, or command output if available.

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Bug is fixed.
        - [ ] Regression test or verification is added if practical.
        - [ ] Relevant checks pass.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints / Non-Goals
      value: |
        - Keep the fix focused; do not refactor unrelated files.
        - Do not change public contracts unless the bug requires it and the PR explains why.
