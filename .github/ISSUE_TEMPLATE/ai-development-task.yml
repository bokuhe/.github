name: AI Development Task
description: A well-scoped implementation task that an AI coding agent can execute safely.
title: "[AI] "
body:
  - type: markdown
    attributes:
      value: |
        Use this for tasks that are ready for AI-assisted implementation.

        Good AI tasks are small, explicit, and reviewable. Include scope, non-goals,
        acceptance criteria, and the exact checks the agent should run.

  - type: dropdown
    id: mode
    attributes:
      label: Execution Mode
      description: How much autonomy should the agent have?
      options:
        - Plan only — do not implement yet
        - Implement with PR — human review required
        - Implement with PR — auto-merge allowed if repo rules permit
      default: 1
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this task is complete?
      placeholder: "Example: Users can save an encrypted draft locally and reopen it after app restart."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Background, current behavior, relevant links, or product/design notes.
      placeholder: |
        Why this matters:
        Current behavior:
        Related docs/issues/PRs:
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this task? Use checkboxes when possible.
      placeholder: |
        - [ ] Add ...
        - [ ] Update ...
        - [ ] Add/adjust tests for ...
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope / Non-Goals
      description: What must the agent not change in this task?
      placeholder: |
        - Do not refactor unrelated files.
        - Do not change public API contracts unless explicitly listed in Scope.
        - Do not add dependencies unless justified in the PR.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Conditions that must be met before the task is considered done.
      placeholder: |
        - [ ] User-visible behavior matches the Goal.
        - [ ] Edge cases listed in Context are handled.
        - [ ] Relevant tests/checks pass.
        - [ ] PR explains risks or uncertainties.
    validations:
      required: true

  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant Files / Docs
      description: Files, directories, docs, or conventions the agent should read first.
      placeholder: |
        - AGENTS.md
        - docs/architecture.md
        - src/...
        - tests/...

  - type: textarea
    id: verification
    attributes:
      label: Verification Plan
      description: Exact commands or manual checks the agent should run before opening a PR.
      placeholder: |
        - npm test
        - npm run lint
        - npm run typecheck
        - manual: ...
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk Level
      description: High-risk tasks should usually require explicit human approval before merge.
      options:
        - Low — localized change, easy rollback
        - Medium — multiple areas or user-visible behavior
        - High — data migration, auth/security/crypto, payments, production ops
      default: 0
    validations:
      required: true

  - type: textarea
    id: agent_notes
    attributes:
      label: Agent Notes
      description: Extra instructions for AI agents.
      value: |
        - Keep the diff small and focused on this issue.
        - Prefer simple, maintainable code over clever abstractions.
        - If requirements are ambiguous, stop and ask rather than guessing.
        - In the PR, include a summary, verification results, risks, and any follow-up work.
